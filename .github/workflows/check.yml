name: EMA Touch Alert

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ema-alert-bot
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Verifier les EMA et alerter si besoin
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ema_alert.py

      - name: Sauvegarder l'etat et la config (evite les alertes en double)
        run: |
          git config user.name "ema-bot"
          git config user.email "ema-bot@users.noreply.github.com"
          git add state.json config.json
          git diff --cached --quiet || git commit -m "Update state [skip ci]"
          git push
          
